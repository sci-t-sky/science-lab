<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>빛의 합성 관찰하기 v1.2</title>
    <style>
        :root {
            --bg-ui: #ffffff;
            --bg-stage: #000000;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --border: #ececec;
            --accent: #d35400;
            --info-blue: #2980b9;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-ui);
            color: var(--text-main);
            font-family: 'Pretendard', -apple-system, sans-serif;
            overflow: hidden;
            touch-action: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 헤더 */
        #header {
            width: 100%;
            padding: 25px 0;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: #fff;
            z-index: 10;
        }

        h1 { margin: 0; font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }

        /* 실험 스테이지 */
        #stage-container {
            position: relative;
            width: 100vw;
            height: calc(100vh - 180px);
            background-color: var(--bg-stage);
            overflow: hidden;
        }

        canvas { display: block; }

        /* 저작권 푸터 */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 15px 0;
            background-color: var(--bg-ui);
            border-top: 1px solid var(--border);
            text-align: center;
            z-index: 20;
        }

        .footer-text { font-size: 0.85rem; color: var(--text-main); font-weight: 600; margin-bottom: 4px; }
        .footer-sub { font-size: 0.75rem; color: var(--text-sub); }
        .device-support { font-size: 0.7rem; color: #bdc3c7; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="header">
        <h1>빛의 합성 관찰하기</h1>
    </div>

    <div id="stage-container">
        <canvas id="mainCanvas"></canvas>
    </div>

    <footer>
        <div class="footer-text">© 2026. LEE HANEUL All rights reserved.</div>
        <div class="footer-sub">빛의 합성 실험 v1.2 (2026-04-26)</div>
        <div class="device-support">본 프로그램은 아이패드 및 태블릿 환경에서의 터치 조작을 지원합니다.</div>
    </footer>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        
        // 정교한 실루엣 마스킹을 위한 오프스크린 캔버스
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');

        // 빛 설정 (R: 왼쪽, G: 오른쪽, B: 상단 중앙)
        let lights = [
            { id: 'R', x: 0, y: 0, r: 255, g: 0, b: 0, color: 'rgb(255,0,0)', angle: Math.PI * 0.75 }, 
            { id: 'G', x: 0, y: 0, r: 0, g: 255, b: 0, color: 'rgb(0,255,0)', angle: Math.PI * 0.25 },
            { id: 'B', x: 0, y: 0, r: 0, g: 0, b: 255, color: 'rgb(0,0,255)', angle: Math.PI * 1.50 }  
        ];

        // 물체 설정 (반사율)
        let items = [
            { name: '장미', emoji: '🌹', x: 0, y: 0, homeX: 0, homeY: 0, ref: {r:1, g:0.1, b:0.1} },
            { name: '바나나', emoji: '🍌', x: 0, y: 0, homeX: 0, homeY: 0, ref: {r:1, g:1, b:0.1} },
            { name: '잎사귀', emoji: '🌿', x: 0, y: 0, homeX: 0, homeY: 0, ref: {r:0.1, g:1, b:0.1} }
        ];

        const LIGHT_RADIUS = 150;     
        const HANDLE_DISTANCE = 300; 
        const SIDEBAR_WIDTH = 240; 
        const METHOD_SECTION_HEIGHT = 200; // 실험 방법 텍스트 영역 높이
        let isDragging = false;
        let activeObj = null;
        let dragOffset = { x: 0, y: 0 };

        function init() {
            window.addEventListener('resize', resize);
            resize();
            setInitialPositions();
            animate();
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - 180;
            tempCanvas.width = 160;
            tempCanvas.height = 160;
        }

        function setInitialPositions() {
            const stageW = canvas.width - SIDEBAR_WIDTH;
            const cx = stageW / 2;
            const cy = canvas.height / 2;
            
            // 조명 초기 위치
            lights[0].x = cx - 120; lights[0].y = cy + 50;  
            lights[1].x = cx + 120; lights[1].y = cy + 50;  
            lights[2].x = cx;       lights[2].y = cy - 100; 

            // 물체 위치: 실험 방법과 드래그 가이드라인보다 더 아래에 배치 (y=340부터 시작)
            items.forEach((item, i) => {
                item.homeX = canvas.width - (SIDEBAR_WIDTH / 2);
                item.homeY = 340 + (i * 95); 
                if (!isDragging) {
                    item.x = item.homeX;
                    item.y = item.homeY;
                }
            });
        }

        function drawScene() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 사이드바 배경
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(canvas.width - SIDEBAR_WIDTH, 0, SIDEBAR_WIDTH, canvas.height);
            ctx.strokeStyle = "#ececec";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(canvas.width - SIDEBAR_WIDTH, 0);
            ctx.lineTo(canvas.width - SIDEBAR_WIDTH, canvas.height);
            ctx.stroke();

            drawSidebarUI();
            lights.forEach(drawLightSystem);
            items.forEach(drawItemWithSilhouette);
            ctx.globalCompositeOperation = 'source-over';
            lights.forEach(drawFlashlightBody);
        }

        function drawSidebarUI() {
            const sidebarX = canvas.width - SIDEBAR_WIDTH;
            const centerX = canvas.width - (SIDEBAR_WIDTH / 2);
            const startX = sidebarX + 25; 
            
            // 1. 실험 방법 (상단 고정)
            ctx.textAlign = "center";
            ctx.fillStyle = "#d35400";
            ctx.font = "bold 15px sans-serif";
            ctx.fillText("실험 방법", centerX, 45);
            
            ctx.textAlign = "left";
            ctx.fillStyle = "#34495e";
            ctx.font = "11.5px sans-serif";
            const lines = [
                "1. 빛을 여러 가지로 조합하여",
                "   비추어 보세요.",
                "",
                "2. 겹쳐진 부분이 어떤 색으로",
                "   보이는지 관찰해 보세요.",
                "",
                "3. 물체를 왼쪽 빛 아래로 옮겨",
                "   색의 변화를 확인하세요."
            ];
            lines.forEach((line, i) => ctx.fillText(line, startX, 85 + (i * 18)));

            // 2. 구분선 (방법 영역 바로 아래)
            ctx.setLineDash([4, 3]);
            ctx.strokeStyle = "#dee2e6";
            ctx.beginPath();
            ctx.moveTo(sidebarX + 20, 245);
            ctx.lineTo(canvas.width - 20, 245);
            ctx.stroke();
            ctx.setLineDash([]);

            // 3. 물체 드래그 가이드 (구분선과 물체 사이)
            ctx.textAlign = "center";
            ctx.fillStyle = "#bdc3c7";
            ctx.font = "bold 10px sans-serif";
            ctx.fillText("▼ 물체를 왼쪽으로 드래그 하세요", centerX, 280);

            // 4. 물체의 색깔이 보이는 원리 (하단 고정)
            const infoY = canvas.height - 120;
            ctx.fillStyle = "#f8f9fa";
            ctx.fillRect(sidebarX + 10, infoY, SIDEBAR_WIDTH - 20, 100);
            
            ctx.textAlign = "center";
            ctx.fillStyle = "#2980b9";
            ctx.font = "bold 13px sans-serif";
            ctx.fillText("[ 물체의 색깔이 보이는 원리 ]", centerX, infoY + 25);
            
            ctx.textAlign = "left";
            ctx.fillStyle = "#7f8c8d";
            ctx.font = "11px sans-serif";
            const principle = [
                "물체의 색은 물체가 반사한",
                "빛의 색입니다. 비춘 빛 중에",
                "물체가 반사할 수 있는 색이",
                "없으면 검게 보입니다."
            ];
            principle.forEach((text, i) => ctx.fillText(text, sidebarX + 25, infoY + 48 + (i * 16)));
        }

        function drawLightSystem(l) {
            const hX = l.x + Math.cos(l.angle) * HANDLE_DISTANCE;
            const hY = l.y + Math.sin(l.angle) * HANDLE_DISTANCE;
            l.hX = hX; l.hY = hY;

            const headTipX = hX - Math.cos(l.angle) * 15;
            const headTipY = hY - Math.sin(l.angle) * 15;

            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            const targetAngle = Math.atan2(l.y - headTipY, l.x - headTipX);
            const grad = ctx.createLinearGradient(headTipX, headTipY, l.x, l.y);
            grad.addColorStop(0, l.color.replace('rgb', 'rgba').replace(')', ', 0.45)'));
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(headTipX, headTipY);
            ctx.lineTo(l.x + Math.cos(targetAngle + Math.PI/2) * LIGHT_RADIUS, l.y + Math.sin(targetAngle + Math.PI/2) * LIGHT_RADIUS);
            ctx.lineTo(l.x + Math.cos(targetAngle - Math.PI/2) * LIGHT_RADIUS, l.y + Math.sin(targetAngle - Math.PI/2) * LIGHT_RADIUS);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = l.color;
            ctx.beginPath();
            ctx.arc(l.x, l.y, LIGHT_RADIUS, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawItemWithSilhouette(item) {
            if (item.x > canvas.width - SIDEBAR_WIDTH) {
                // 사이드바 내부 (원래 색상)
                ctx.save();
                ctx.font = "62px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(item.emoji, item.x, item.y);
                ctx.restore();
                return;
            }

            // 스테이지 내부 (반사광 합성)
            let rIn = 30, gIn = 30, bIn = 30; 
            lights.forEach(l => {
                if (Math.hypot(l.x - item.x, l.y - item.y) < LIGHT_RADIUS) {
                    rIn += l.r; gIn += l.g; bIn += l.b;
                }
            });
            const fR = Math.min(255, rIn * item.ref.r);
            const fG = Math.min(255, gIn * item.ref.g);
            const fB = Math.min(255, bIn * item.ref.b);

            tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
            tempCtx.font = "62px Arial";
            tempCtx.textAlign = "center";
            tempCtx.textBaseline = "middle";
            tempCtx.globalCompositeOperation = 'source-over';
            tempCtx.fillText(item.emoji, tempCanvas.width / 2, tempCanvas.height / 2);
            tempCtx.globalCompositeOperation = 'source-in';
            tempCtx.fillStyle = `rgb(${fR}, ${fG}, ${fB})`;
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tempCtx.globalCompositeOperation = 'multiply';
            tempCtx.fillText(item.emoji, tempCanvas.width / 2, tempCanvas.height / 2);

            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = `rgb(${fR}, ${fG}, ${fB})`;
            ctx.drawImage(tempCanvas, item.x - tempCanvas.width / 2, item.y - tempCanvas.height / 2);
            ctx.restore();
        }

        function drawFlashlightBody(l) {
            ctx.save();
            ctx.translate(l.hX, l.hY);
            ctx.rotate(l.angle + Math.PI/2);
            ctx.fillStyle = "#333333";
            ctx.fillRect(-15, 5, 30, 60);
            ctx.fillStyle = "#95a5a6";
            ctx.fillRect(-22, -12, 44, 22);
            ctx.fillStyle = l.color;
            ctx.fillRect(-18, -16, 36, 6);
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 15px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(l.id, 0, 45);
            ctx.restore();
        }

        function animate() {
            drawScene();
            requestAnimationFrame(animate);
        }

        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            const ev = e.touches ? e.touches[0] : e;
            return { x: ev.clientX - rect.left, y: ev.clientY - rect.top };
        }

        function onStart(e) {
            const p = getPointerPos(e);
            for (let item of items) {
                if (Math.hypot(item.x - p.x, item.y - p.y) < 45) {
                    isDragging = true;
                    activeObj = { type: 'item', data: item };
                    dragOffset.x = p.x - item.x;
                    dragOffset.y = p.y - item.y;
                    return;
                }
            }
            for (let l of lights) {
                if (Math.hypot(l.hX - p.x, l.hY - p.y) < 60) {
                    isDragging = true;
                    activeObj = { type: 'light', data: l };
                    dragOffset.x = p.x - l.x;
                    dragOffset.y = p.y - l.y;
                    return;
                }
            }
        }

        function onMove(e) {
            if (!isDragging) return;
            const p = getPointerPos(e);
            activeObj.data.x = p.x - dragOffset.x;
            activeObj.data.y = p.y - dragOffset.y;
        }

        function onEnd() { 
            if (isDragging && activeObj && activeObj.type === 'item') {
                const item = activeObj.data;
                if (item.x > canvas.width - SIDEBAR_WIDTH - 40) {
                    item.x = item.homeX;
                    item.y = item.homeY;
                }
            }
            isDragging = false; 
            activeObj = null; 
        }

        canvas.addEventListener('mousedown', onStart);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onEnd);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onStart(e); }, {passive: false});
        window.addEventListener('touchmove', (e) => { if(isDragging) e.preventDefault(); onMove(e); }, {passive: false});
        window.addEventListener('touchend', onEnd);

        init();
    </script>
</body>
</html>
