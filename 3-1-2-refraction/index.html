<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>빛의 굴절 실험실 v1.2.5</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --panel-bg: #f8f9fa;
            --border-color: #dee2e6;
            --laser-red: #ff0000;
            --refract-orange: #ff9100;
        }
        
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            margin: 0; display: flex; height: 100vh; 
            background: var(--bg-color); color: #333; overflow: hidden; 
            touch-action: none;
        }
        
        /* 컨트롤 패널: iPad 가로폭 대응 */
        #controls {
            width: 350px; background: var(--panel-bg); border-right: 1px solid var(--border-color);
            padding: 25px; display: flex; flex-direction: column; gap: 15px; z-index: 10;
            overflow-y: auto; box-sizing: border-box;
        }
        
        .control-group { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        label { font-weight: bold; font-size: 14px; color: #495057; }
        select { padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: white; font-size: 15px; cursor: pointer; }
        
        button {
            padding: 14px; font-size: 15px; font-weight: bold; border: none; border-radius: 8px;
            cursor: pointer; transition: 0.2s; margin-top: 5px;
        }
        .btn-power { background: #495057; color: white; }
        .btn-power.on { background: var(--laser-red); box-shadow: 0 0 10px rgba(255,0,0,0.3); }
        .btn-tool { background: #e9ecef; color: #495057; border: 1px solid #ced4da; }
        .btn-tool.active { background: #339af0; color: white; border-color: #339af0; }

        .method-box {
            background: #fff; border: 1px solid #e9ecef; border-radius: 8px;
            padding: 15px; font-size: 14px; line-height: 1.6; color: #495057; flex-shrink: 0;
            white-space: nowrap;
        }
        .method-box b { color: #339af0; }

        /* 하단 고정 저작권 표시 */
        .global-copyright {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #868e96;
            line-height: 1.6;
            pointer-events: none;
            z-index: 100;
            word-break: keep-all;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            padding: 5px 0;
        }

        #experiment-area { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: white; }
        canvas { cursor: crosshair; touch-action: none; }
    </style>
</head>
<body>

<div id="controls">
    <h2 style="margin:0 0 10px 0; font-size: 24px; color: #212529;">빛의 굴절 실험실</h2>
    
    <div class="method-box">
        <b>[실험 방법]</b><br>
        1. <b>레이저 켜기</b> 버튼을 클릭합니다.<br>
        2. 화면의 <b>레이저 장치</b>를 드래그합니다.<br>
        3. <b>물질</b>을 바꾸며 경로 변화를 관찰합니다.<br>
        4. <b>각도기</b>로 굴절되는 정도를 측정합니다.
    </div>
    
    <div class="control-group">
        <label>1. 레이저 전원</label>
        <button id="power-toggle" class="btn-power">레이저 켜기</button>
    </div>

    <div class="control-group">
        <label>2. 보조 도구</label>
        <button id="protractor-toggle" class="btn-tool">각도기 표시</button>
    </div>

    <div class="control-group">
        <label>3. 위쪽 물질 선택</label>
        <select id="medium1-select">
            <option value="1.00" selected>공기</option>
            <option value="1.33">물</option>
            <option value="1.47">식용유</option>
            <option value="1.52">유리</option>
            <option value="2.42">다이아몬드</option>
        </select>
    </div>

    <div class="control-group">
        <label>4. 아래쪽 물질 선택</label>
        <select id="medium2-select">
            <option value="1.00">공기</option>
            <option value="1.33" selected>물</option>
            <option value="1.47">식용유</option>
            <option value="1.52">유리</option>
            <option value="2.42">다이아몬드</option>
        </select>
    </div>

    <div class="control-group">
        <label>5. 빛을 쏘는 방향</label>
        <select id="direction-select">
            <option value="top">위에서 아래로</option>
            <option value="bottom">아래에서 위로</option>
        </select>
    </div>
</div>

<div id="experiment-area">
    <canvas id="simCanvas"></canvas>
</div>

<div class="global-copyright">
    © 2026. <b>LEE HANEUL</b> All rights reserved. Physics Simulation: Light Refraction v1.2.5 (2026-04-23)<br>
    본 프로그램은 아이패드 및 태블릿 환경에서의 터치 조작을 지원합니다.
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const m1Sel = document.getElementById('medium1-select');
    const m2Sel = document.getElementById('medium2-select');
    const dirSel = document.getElementById('direction-select');
    const powerBtn = document.getElementById('power-toggle');
    const protBtn = document.getElementById('protractor-toggle');

    function resizeCanvas() {
        canvas.width = window.innerWidth - (window.innerWidth > 768 ? 350 : 0);
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    let isOn = false;
    let showProtractor = false; // 각도기 기본 꺼짐 상태
    let isDragging = false;
    let laserPos = { x: -200, y: -220 }; 
    let beamProgress = 0;
    
    const COLOR_INC = "#ff0000"; 
    const COLOR_REF = "#ff9100"; 
    const beamThickness = 4;

    const mediumColors = {
        "1.00": "#ffffff", 
        "1.33": "#e1f5fe", 
        "1.47": "#fffde7", 
        "1.52": "#f1f8e9", 
        "2.42": "#f3e5f5"  
    };

    powerBtn.addEventListener('click', () => {
        isOn = !isOn;
        beamProgress = 0;
        powerBtn.innerText = isOn ? "레이저 끄기" : "레이저 켜기";
        powerBtn.classList.toggle('on', isOn);
    });

    protBtn.addEventListener('click', () => {
        showProtractor = !showProtractor;
        protBtn.innerText = showProtractor ? "각도기 숨기기" : "각도기 표시";
        protBtn.classList.toggle('active', showProtractor);
    });

    function updateLaserPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const mx = clientX - rect.left - canvas.width / 2;
        const my = clientY - rect.top - canvas.height / 2;
        const isTop = dirSel.value === 'top';
        if (isTop && my < -20) { laserPos.x = mx; laserPos.y = my; }
        else if (!isTop && my > 20) { laserPos.x = mx; laserPos.y = my; }
        if (isOn) beamProgress = 2;
    }

    canvas.addEventListener('mousedown', (e) => { isDragging = true; updateLaserPos(e.clientX, e.clientY); });
    window.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('mousemove', (e) => { if(isDragging) updateLaserPos(e.clientX, e.clientY); });
    
    canvas.addEventListener('touchstart', (e) => { 
        isDragging = true; 
        updateLaserPos(e.touches[0].clientX, e.touches[0].clientY); 
    }, {passive: false});
    window.addEventListener('touchend', () => isDragging = false);
    canvas.addEventListener('touchmove', (e) => { 
        e.preventDefault(); 
        updateLaserPos(e.touches[0].clientX, e.touches[0].clientY); 
    }, {passive: false});

    function drawProtractor(cx, cy, r) {
        ctx.save();
        ctx.lineWidth = 1; ctx.font = "11px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        const drawHalf = (isTop) => {
            ctx.strokeStyle = "rgba(0,0,0,0.12)"; ctx.fillStyle = "rgba(0,0,0,0.4)";
            ctx.beginPath(); ctx.arc(cx, cy, r, isTop ? Math.PI : 0, isTop ? 0 : Math.PI); ctx.stroke();
            for (let i = 0; i <= 180; i += 10) {
                const angleRad = isTop ? (Math.PI + i * Math.PI / 180) : ((180 - i) * Math.PI / 180);
                ctx.fillText(i, cx + Math.cos(angleRad) * (r - 25), cy + Math.sin(angleRad) * (r - 25));
                ctx.beginPath(); ctx.moveTo(cx + Math.cos(angleRad) * r, cy + Math.sin(angleRad) * r);
                ctx.lineTo(cx + Math.cos(angleRad) * (r-10), cy + Math.sin(angleRad) * (r-10)); ctx.stroke();
            }
        };
        drawHalf(true); drawHalf(false); ctx.restore();
    }

    function drawArrowOnBeam(x1, y1, x2, y2, color) {
        const angle = Math.atan2(y2 - y1, x2 - x1);
        const mx = x1 + (x2 - x1) * 0.5;
        const my = y1 + (y2 - y1) * 0.5;
        ctx.save();
        ctx.translate(mx, my); ctx.rotate(angle);
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-12, -7); ctx.moveTo(0, 0); ctx.lineTo(-12, 7);
        ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.stroke();
        ctx.restore();
    }

    function drawLaserPointer(x, y, rad) {
        ctx.save(); ctx.translate(x, y); ctx.rotate(rad);
        ctx.fillStyle = "#343a40"; ctx.fillRect(-40, -12, 50, 24);
        ctx.fillStyle = COLOR_INC; ctx.beginPath(); ctx.arc(-15, -12, 3, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2; const cy = canvas.height / 2;
        
        ctx.fillStyle = mediumColors[m1Sel.value]; ctx.fillRect(0, 0, canvas.width, cy);
        ctx.fillStyle = mediumColors[m2Sel.value]; ctx.fillRect(0, cy, canvas.width, canvas.height - cy);
        
        ctx.beginPath(); ctx.moveTo(cx-500, cy); ctx.lineTo(cx+500, cy);
        ctx.strokeStyle = "#339af0"; ctx.lineWidth = 2.5; ctx.stroke();

        if (showProtractor) drawProtractor(cx, cy, 280);

        // 법선
        ctx.setLineDash([5, 10]); ctx.strokeStyle = "rgba(0,0,0,0.1)";
        ctx.beginPath(); ctx.moveTo(cx, cy-350); ctx.lineTo(cx, cy+350); ctx.stroke(); ctx.setLineDash([]);

        // --- 물질 이름 원래 위치(좌측) 표시 ---
        ctx.save();
        ctx.textAlign = "left"; 
        ctx.font = "bold 15px Pretendard"; 
        
        // 위쪽 물질 이름
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.fillText(m1Sel.options[m1Sel.selectedIndex].text, cx - 440, cy - 20);
        
        // 아래쪽 물질 이름
        ctx.fillStyle = "#339af0";
        ctx.fillText(m2Sel.options[m2Sel.selectedIndex].text, cx - 440, cy + 30);
        ctx.restore();

        const angleToCenter = Math.atan2(cy - (cy + laserPos.y), cx - (cx + laserPos.x));
        drawLaserPointer(cx + laserPos.x, cy + laserPos.y, angleToCenter);

        if (isOn) {
            if (beamProgress < 2) beamProgress += 0.05;
            const n1 = parseFloat(m1Sel.value), n2 = parseFloat(m2Sel.value);
            const isTop = dirSel.value === 'top';
            const nIn = isTop ? n1 : n2, nOut = isTop ? n2 : n1;
            const theta1 = Math.atan2(Math.abs(laserPos.x), Math.abs(laserPos.y));
            const sinTheta2 = (nIn * Math.sin(theta1)) / nOut;
            const isReflectingOnly = (nIn > nOut) && (sinTheta2 >= 1.0);

            const p1 = Math.min(1, beamProgress);
            const lx = cx + laserPos.x, ly = cy + laserPos.y;
            const bx = lx + (cx - lx) * p1, by = ly + (cy - ly) * p1;
            ctx.save(); ctx.strokeStyle = COLOR_INC; ctx.lineWidth = beamThickness; ctx.lineCap = "round";
            ctx.shadowBlur = 4; ctx.shadowColor = COLOR_INC;
            ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(bx, by); ctx.stroke();
            if (p1 > 0.5) drawArrowOnBeam(lx, ly, cx, cy, COLOR_INC); ctx.restore();

            if (beamProgress > 1) {
                const p2 = beamProgress - 1;
                const beamLen = 450; let endX, endY;
                if (isReflectingOnly) {
                    endX = cx - laserPos.x; endY = cy + laserPos.y;
                } else {
                    const theta2 = Math.asin(sinTheta2);
                    const signX = laserPos.x > 0 ? -1 : 1, signY = isTop ? 1 : -1;
                    endX = cx + Math.sin(theta2) * beamLen * signX; endY = cy + Math.cos(theta2) * beamLen * signY;
                }
                ctx.save(); ctx.strokeStyle = COLOR_REF; ctx.lineWidth = beamThickness; ctx.lineCap = "round";
                ctx.shadowBlur = 4; ctx.shadowColor = COLOR_REF;
                ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + (endX - cx) * p2, cy + (endY - cy) * p2); ctx.stroke();
                if (p2 > 0.5) drawArrowOnBeam(cx, cy, endX, endY, COLOR_REF); ctx.restore();
            }
        }
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
