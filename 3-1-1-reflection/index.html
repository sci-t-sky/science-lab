<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>빛의 반사 법칙 시뮬레이션 v1.2.2</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Nanum Gothic', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* 터치 시 텍스트 선택 방지 */
            -webkit-user-select: none;
            user-select: none;
        }

        header {
            width: 100%;
            background-color: #2c3e50;
            color: white;
            padding: 20px 0;
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 10;
        }

        #main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            padding: 40px 20px;
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            box-sizing: border-box;
            flex-wrap: wrap; /* 화면 좁아지면 아래로 배치 */
        }

        #canvas-container {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            line-height: 0;
            touch-action: none; /* 브라우저 기본 터치 동작 방지 */
        }
        canvas { cursor: crosshair; border-radius: 15px; max-width: 100%; height: auto; }

        #control-panel {
            width: 380px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 { font-size: 1.3rem; margin: 0 0 5px 0; color: #34495e; border-bottom: 3px solid #3498db; display: inline-block; }

        .instruction {
            font-size: 0.9rem;
            color: #7f8c8d;
            line-height: 1.5;
            background: #e8f4fd;
            padding: 10px;
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }

        .input-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #e9ecef;
        }
        .input-box label { display: block; font-size: 0.9rem; margin-bottom: 5px; color: #2c3e50; font-weight: bold; }
        .input-box input {
            width: 100px;
            padding: 10px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            margin-bottom: 12px;
            outline: none;
        }

        .btn-add {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .log-container {
            flex-grow: 1;
            overflow-y: auto;
            max-height: 220px;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #f1f3f5; color: #666; position: sticky; top: 0; }
        .match-text { color: #27ae60; font-weight: bold; }

        .btn-reset {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.75rem;
            align-self: flex-end;
        }

        footer {
            width: 100%;
            background-color: #2c3e50;
            color: #bdc3c7;
            text-align: center;
            padding: 25px 0;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        footer .copyright { color: #ffffff; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

    <header>
        빛의 반사 법칙 실험실
    </header>

    <div id="main-wrapper">
        <div id="canvas-container">
            <canvas id="simCanvas"></canvas>
        </div>

        <div id="control-panel">
            <h2>측정 방법</h2>
            <p class="instruction">
                1. 화면의 레이저를 <b>드래그(터치)</b>하여 각도를 조절하세요.<br>
                2. <b>법선(90°)</b>을 기준으로 눈금을 직접 읽어보세요.<br>
                3. 아래에 측정값을 입력하고 결과를 확인하세요.
            </p>

            <div class="input-box">
                <label>내가 측정한 입사각(i):</label>
                <input type="number" id="ui-i" pattern="\[0-9]*\" inputmode="decimal" placeholder="도(°)">
                <label>내가 측정한 반사각(r):</label>
                <input type="number" id="ui-r" pattern="\[0-9]*\" inputmode="decimal" placeholder="도(°)">
                <button class="btn-add" onclick="saveRecord()">비교 및 기록하기</button>
            </div>

            <div class="log-container">
                <table>
                    <thead>
                        <tr>
                            <th>회차</th>
                            <th>내 측정값</th>
                            <th>실제 정답</th>
                        </tr>
                    </thead>
                    <tbody id="log-body"></tbody>
                </table>
            </div>
            <button class="btn-reset" onclick="resetLogs()">기록 초기화</button>
        </div>
    </div>

    <footer>
        <div class="copyright">Copyright © 2026 LEE HANEUL. All Rights Reserved.</div>
        <div class="version">Physics Simulation: Light Reflection v1.2.2 (2026-04-21)</div>
        <div>본 프로그램은 아이패드 및 태블릿 환경에서의 터치 조작을 지원합니다.</div>
    </footer>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const logBody = document.getElementById('log-body');

    const W = 800;
    const H = 600;
    canvas.width = W;
    canvas.height = H;

    const CX = W / 2;
    const CY = H - 100;
    const R = 320;

    let isInteracting = false;
    let currentAngleFromNormal = 30;
    let count = 0;

    function draw() {
        ctx.clearRect(0, 0, W, H);

        // 1. 각도기 배경
        ctx.beginPath();
        ctx.arc(CX, CY, R, Math.PI, 0);
        ctx.fillStyle = "white";
        ctx.fill();

        // 2. 거울
        ctx.fillStyle = "#2c3e50"; 
        ctx.fillRect(CX - 380, CY, 760, 40);
        ctx.beginPath();
        ctx.moveTo(CX - 380, CY);
        ctx.lineTo(CX + 380, CY);
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
        ctx.stroke();

        // 3. 레이저 광선
        const radIn = (90 + currentAngleFromNormal - 180) * (Math.PI / 180);
        const radOut = (90 - currentAngleFromNormal - 180) * (Math.PI / 180);
        const inX = CX + Math.cos(radIn) * R;
        const inY = CY + Math.sin(radIn) * R;
        const outX = CX + Math.cos(radOut) * R;
        const outY = CY + Math.sin(radOut) * R;

        drawLaser(inX, inY, CX, CY, "#ff3e3e");
        drawLaser(CX, CY, outX, outY, "#3498db");
        drawDevice(inX, inY, Math.atan2(CY - inY, CX - inX));

        // 4. 각도기 눈금 (최상단)
        drawProtractorScales();

        // 5. 법선
        ctx.beginPath();
        ctx.setLineDash([5, 5]);
        ctx.moveTo(CX, CY);
        ctx.lineTo(CX, CY - R - 20);
        ctx.strokeStyle = "#e67e22";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = "#e67e22";
        ctx.font = "bold 14px Arial";
        ctx.textAlign = "center";
        ctx.fillText("법선(90°)", CX, CY - R - 30);
    }

    function drawProtractorScales() {
        for (let i = 0; i <= 180; i += 1) {
            const rad = (i - 180) * (Math.PI / 180);
            let len = (i % 10 === 0) ? 25 : (i % 5 === 0 ? 15 : 10);
            const x1 = CX + Math.cos(rad) * R;
            const y1 = CY + Math.sin(rad) * R;
            const x2 = CX + Math.cos(rad) * (R - len);
            const y2 = CY + Math.sin(rad) * (R - len);

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = i % 10 === 0 ? "#000" : "#999";
            ctx.lineWidth = i % 10 === 0 ? 2 : 1;
            ctx.stroke();

            if (i % 10 === 0) {
                ctx.font = "bold 15px Arial";
                ctx.fillStyle = "#000";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                const tx = CX + Math.cos(rad) * (R - 45);
                const ty = CY + Math.sin(rad) * (R - 45);
                ctx.fillText(i, tx, ty);
            }
        }
        ctx.beginPath();
        ctx.arc(CX, CY, R, Math.PI, 0);
        ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.stroke();
    }

    function drawLaser(x1, y1, x2, y2, color) {
        ctx.save();
        ctx.shadowBlur = 15; ctx.shadowColor = color;
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
        ctx.strokeStyle = color; ctx.lineWidth = 5; ctx.stroke();
        ctx.restore();
        const mx = (x1 + x2) / 2; const my = (y1 + y2) / 2; const ang = Math.atan2(y2 - y1, x2 - x1);
        ctx.beginPath(); ctx.moveTo(mx, my);
        ctx.lineTo(mx - 15 * Math.cos(ang - 0.4), my - 15 * Math.sin(ang - 0.4));
        ctx.moveTo(mx, my);
        ctx.lineTo(mx - 15 * Math.cos(ang + 0.4), my - 15 * Math.sin(ang + 0.4));
        ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.stroke();
    }

    function drawDevice(x, y, ang) {
        ctx.save(); ctx.translate(x, y); ctx.rotate(ang);
        ctx.fillStyle = "#34495e"; ctx.fillRect(-35, -12, 45, 24);
        ctx.fillStyle = "#95a5a6"; ctx.fillRect(10, -8, 8, 16);
        ctx.restore();
    }

    // 마우스 및 터치 좌표 처리 공통 함수
    function handleInteraction(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        // 캔버스 실제 크기와 표시 크기 비율 계산 (반응형 대응)
        const scaleX = W / rect.width;
        const scaleY = H / rect.height;
        const mx = (clientX - rect.left) * scaleX;
        const my = (clientY - rect.top) * scaleY;
        const dx = mx - CX;
        const dy = my - CY;

        if (dy < -5) {
            let deg = Math.atan2(dy, dx) * (180 / Math.PI);
            currentAngleFromNormal = 90 - Math.abs(deg);
            if (currentAngleFromNormal > 88) currentAngleFromNormal = 88;
            if (currentAngleFromNormal < -88) currentAngleFromNormal = -88;
            draw();
        }
    }

    // 마우스 이벤트
    canvas.addEventListener('mousedown', (e) => { isInteracting = true; handleInteraction(e.clientX, e.clientY); });
    window.addEventListener('mousemove', (e) => { if (isInteracting) handleInteraction(e.clientX, e.clientY); });
    window.addEventListener('mouseup', () => isInteracting = false);

    // 터치 이벤트 (아이패드 대응)
    canvas.addEventListener('touchstart', (e) => {
        isInteracting = true;
        const touch = e.touches[0];
        handleInteraction(touch.clientX, touch.clientY);
        e.preventDefault(); // 스크롤 방지
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        if (isInteracting) {
            const touch = e.touches[0];
            handleInteraction(touch.clientX, touch.clientY);
        }
        e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchend', () => isInteracting = false);

    function saveRecord() {
        const uiI = document.getElementById('ui-i').value;
        const uiR = document.getElementById('ui-r').value;
        if (uiI === "" || uiR === "") return alert("측정값을 먼저 입력해 주세요!");
        count++;
        const actual = Math.abs(Math.round(currentAngleFromNormal));
        const row = document.createElement('tr');
        row.innerHTML = `<td>${count}회</td><td>입:${uiI}°/반:${uiR}°</td><td class="match-text">${actual}°/${actual}°</td>`;
        logBody.prepend(row);
        document.getElementById('ui-i').value = ""; document.getElementById('ui-r').value = "";
    }

    function resetLogs() { if (confirm("실험 기록을 모두 초기화할까요?")) { logBody.innerHTML = ""; count = 0; } }

    draw();
</script>
</body>
</html>
