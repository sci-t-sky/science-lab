<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>빛의 반사 법칙 시뮬레이션 v1.2</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Nanum Gothic', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 상단 실시간 각도 표시 */
        #top-nav {
            width: 100%;
            background-color: #2c3e50;
            color: white;
            padding: 15px 0;
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 10;
        }
        #top-nav span { color: #f1c40f; margin: 0 10px; }

        /* 메인 컨텐츠 (중앙) */
        #main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            padding: 30px;
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        /* 시뮬레이션 영역 */
        #canvas-container {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            line-height: 0;
        }
        canvas { cursor: crosshair; border-radius: 15px; }

        /* 우측 제어판 */
        #control-panel {
            width: 380px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 { font-size: 1.3rem; margin: 0 0 5px 0; color: #34495e; border-bottom: 3px solid #3498db; display: inline-block; }

        .input-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #e9ecef;
        }
        .input-box label { display: block; font-size: 0.9rem; margin-bottom: 5px; color: #2c3e50; font-weight: bold; }
        .input-box input {
            width: 100px;
            padding: 8px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            margin-bottom: 12px;
            outline: none;
        }
        .input-box input:focus { border-color: #3498db; }

        .btn-add {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-add:hover { background-color: #2980b9; }

        /* 테이블 영역 */
        .log-container {
            flex-grow: 1;
            overflow-y: auto;
            max-height: 220px;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #f1f3f5; color: #666; position: sticky; top: 0; }
        .match-text { color: #27ae60; font-weight: bold; }

        .btn-reset {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.75rem;
            align-self: flex-end;
        }

        /* 푸터 저작권 정보 */
        footer {
            width: 100%;
            background-color: #2c3e50;
            color: #bdc3c7;
            text-align: center;
            padding: 20px 0;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        footer .copyright { color: #ffffff; font-weight: bold; margin-bottom: 5px; }
        footer .version { font-family: 'Courier New', Courier, monospace; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="top-nav">
        실시간 측정값 → [ 입사각: <span id="real-i">0</span>° ] [ 반사각: <span id="real-r">0</span>° ]
    </div>

    <div id="main-wrapper">
        <div id="canvas-container">
            <canvas id="simCanvas"></canvas>
        </div>

        <div id="control-panel">
            <h2>측정 기록하기</h2>
            <div class="input-box">
                <label>내가 읽은 입사각:</label>
                <input type="number" id="ui-i" placeholder="도(°)">
                <label>내가 읽은 반사각:</label>
                <input type="number" id="ui-r" placeholder="도(°)">
                <button class="btn-add" onclick="saveRecord()">비교 및 기록</button>
            </div>

            <h2>실험 데이터 목록</h2>
            <div class="log-container">
                <table>
                    <thead>
                        <tr>
                            <th>회차</th>
                            <th>내 입력</th>
                            <th>실제값</th>
                        </tr>
                    </thead>
                    <tbody id="log-body"></tbody>
                </table>
            </div>
            <button class="btn-reset" onclick="resetLogs()">기록 초기화</button>
        </div>
    </div>

    <footer>
        <div class="copyright">Copyright © 2026 LEE HANEUL. All Rights Reserved.</div>
        <div class="version">Physics Simulation: Light Reflection v1.2.0 | Science Education Tool</div>
        <div>본 시뮬레이션은 중학교 과학 교과과정의 빛의 반사 법칙 학습을 위해 제작되었습니다.</div>
    </footer>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const realI = document.getElementById('real-i');
    const realR = document.getElementById('real-r');
    const logBody = document.getElementById('log-body');

    const W = 800;
    const H = 600;
    canvas.width = W;
    canvas.height = H;

    const CX = W / 2;
    const CY = H - 100; // 거울 위치
    const R = 320; // 각도기 반지름

    let isDown = false;
    let currentAngleFromNormal = 30; // 법선 기준 각도
    let count = 0;

    function draw() {
        ctx.clearRect(0, 0, W, H);

        // 1. [레이어 1] 각도기 흰색 배경
        ctx.beginPath();
        ctx.arc(CX, CY, R, Math.PI, 0);
        ctx.fillStyle = "rgba(255, 255, 255, 1)";
        ctx.fill();

        // 2. [레이어 2] 평면 거울 (각도기 배경 위에 그림)
        ctx.fillStyle = "#2c3e50"; 
        ctx.fillRect(CX - 380, CY, 760, 40);
        // 거울 반사면 상단 선
        ctx.beginPath();
        ctx.moveTo(CX - 380, CY);
        ctx.lineTo(CX + 380, CY);
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
        ctx.stroke();

        // 3. [레이어 3] 빛(레이저) 그리기
        const radIn = (90 + currentAngleFromNormal - 180) * (Math.PI / 180);
        const radOut = (90 - currentAngleFromNormal - 180) * (Math.PI / 180);

        const inX = CX + Math.cos(radIn) * R;
        const inY = CY + Math.sin(radIn) * R;
        const outX = CX + Math.cos(radOut) * R;
        const outY = CY + Math.sin(radOut) * R;

        // 입사광 (빨강)
        drawLaser(inX, inY, CX, CY, "#ff3e3e");
        // 반사광 (파랑)
        drawLaser(CX, CY, outX, outY, "#3498db");
        // 레이저 포인터 기기
        drawDevice(inX, inY, Math.atan2(CY - inY, CX - inX));

        // 4. [레이어 4] 각도기 눈금과 숫자 (맨 앞으로 배치하여 0도, 180도 가독성 확보)
        drawProtractorScales();

        // 5. 법선 그리기
        ctx.beginPath();
        ctx.setLineDash([5, 5]);
        ctx.moveTo(CX, CY);
        ctx.lineTo(CX, CY - R - 20);
        ctx.strokeStyle = "#e67e22";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = "#e67e22";
        ctx.font = "bold 14px Arial";
        ctx.textAlign = "center";
        ctx.fillText("법선(90°)", CX, CY - R - 30);

        // 6. 실시간 상단 값 업데이트
        const absAngle = Math.abs(Math.round(currentAngleFromNormal));
        realI.innerText = absAngle;
        realR.innerText = absAngle;
    }

    function drawProtractorScales() {
        for (let i = 0; i <= 180; i += 1) {
            const rad = (i - 180) * (Math.PI / 180);
            let len = 10;
            if (i % 10 === 0) len = 25;
            else if (i % 5 === 0) len = 15;

            const x1 = CX + Math.cos(rad) * R;
            const y1 = CY + Math.sin(rad) * R;
            const x2 = CX + Math.cos(rad) * (R - len);
            const y2 = CY + Math.sin(rad) * (R - len);

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = i % 10 === 0 ? "#000" : "#999";
            ctx.lineWidth = i % 10 === 0 ? 2 : 1;
            ctx.stroke();

            if (i % 10 === 0) {
                ctx.font = "bold 15px Arial";
                ctx.fillStyle = "#000";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                const tx = CX + Math.cos(rad) * (R - 45);
                const ty = CY + Math.sin(rad) * (R - 45);
                ctx.fillText(i, tx, ty);
            }
        }
        // 각도기 외곽 테두리
        ctx.beginPath();
        ctx.arc(CX, CY, R, Math.PI, 0);
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    function drawLaser(x1, y1, x2, y2, color) {
        ctx.save();
        ctx.shadowBlur = 15;
        ctx.shadowColor = color;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = color;
        ctx.lineWidth = 5;
        ctx.stroke();
        ctx.restore();

        // 진행 방향 화살표
        const mx = (x1 + x2) / 2;
        const my = (y1 + y2) / 2;
        const ang = Math.atan2(y2 - y1, x2 - x1);
        ctx.beginPath();
        ctx.moveTo(mx, my);
        ctx.lineTo(mx - 15 * Math.cos(ang - 0.4), my - 15 * Math.sin(ang - 0.4));
        ctx.moveTo(mx, my);
        ctx.lineTo(mx - 15 * Math.cos(ang + 0.4), my - 15 * Math.sin(ang + 0.4));
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    function drawDevice(x, y, ang) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(ang);
        ctx.fillStyle = "#34495e";
        ctx.fillRect(-35, -12, 45, 24);
        ctx.fillStyle = "#95a5a6";
        ctx.fillRect(10, -8, 8, 16);
        ctx.restore();
    }

    function move(e) {
        if (!isDown) return;
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const dx = mx - CX;
        const dy = my - CY;

        if (dy < -5) {
            let deg = Math.atan2(dy, dx) * (180 / Math.PI);
            let pVal = Math.abs(deg); 
            currentAngleFromNormal = 90 - pVal;
            if (currentAngleFromNormal > 88) currentAngleFromNormal = 88;
            if (currentAngleFromNormal < -88) currentAngleFromNormal = -88;
            draw();
        }
    }

    canvas.onmousedown = (e) => { isDown = true; move(e); };
    window.onmousemove = move;
    window.onmouseup = () => isDown = false;

    function saveRecord() {
        const uiI = document.getElementById('ui-i').value;
        const uiR = document.getElementById('ui-r').value;
        if (uiI === "" || uiR === "") return alert("각도를 먼저 입력해주세요!");

        count++;
        const actual = Math.abs(Math.round(currentAngleFromNormal));
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${count}</td>
            <td>입:${uiI}° / 반:${uiR}°</td>
            <td class="match-text">${actual}° / ${actual}°</td>
        `;
        logBody.prepend(row);
        document.getElementById('ui-i').value = "";
        document.getElementById('ui-r').value = "";
    }

    function resetLogs() {
        if (confirm("기록된 모든 데이터를 삭제하시겠습니까?")) {
            logBody.innerHTML = "";
            count = 0;
        }
    }

    // 페이지 로드 시 초기 그리기
    draw();
</script>
</body>
</html>
